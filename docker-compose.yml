services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nodeglow}
      POSTGRES_USER: ${POSTGRES_USER:-nodeglow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nodeglow}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: nodeglow-ch
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/nodeglow.xml:ro
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_DB: nodeglow
      CLICKHOUSE_USER: nodeglow
      # Use separate CLICKHOUSE_PASSWORD if set, otherwise fall back to POSTGRES_PASSWORD
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nodeglow:
    build: ./backend
    container_name: nodeglow
    ports:
      - "514:1514/udp"    # Syslog UDP (host 514 → container 1514)
      - "1514:1514/tcp"   # Syslog TCP
    expose:
      - "8000"             # Internal only — frontend proxies all requests
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nodeglow}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-nodeglow}
      CLICKHOUSE_URL: http://nodeglow:${CLICKHOUSE_PASSWORD:-${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}}@clickhouse:8123/nodeglow
      DATA_DIR: /data
      SYSLOG_PORT: "1514"
      UPDATE_SIDECAR_URL: http://updater:9100
      UPDATE_SIDECAR_TOKEN: ${UPDATE_SIDECAR_TOKEN:?Set UPDATE_SIDECAR_TOKEN in .env (shared with updater)}
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    cap_add:
      - NET_RAW   # Required for ICMP ping
    restart: unless-stopped

  updater:
    build: ./sidecar
    container_name: nodeglow-updater
    volumes:
      - .:/opt/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      UPDATE_SIDECAR_TOKEN: ${UPDATE_SIDECAR_TOKEN:?Set UPDATE_SIDECAR_TOKEN in .env (shared with backend)}
    expose:
      - "9100"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nodeglow-frontend
    ports:
      - "8000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      - nodeglow
    restart: unless-stopped

volumes:
  pgdata:
  chdata:
