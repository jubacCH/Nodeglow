<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – NODEGLOW</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/nodeglow.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ng-bg':       '#0B1120',
            'ng-surface':  '#0F172A',
            'ng-elevated': '#1E293B',
            'ng-primary':  '#38BDF8',
            'ng-accent':   '#A78BFA',
            'ng-mint':     '#34D399',
            'ng-success':  '#34D399',
            'ng-warning':  '#FBBF24',
            'ng-critical': '#FB7185',
          },
          fontFamily: {
            display: ['"Exo 2"', 'Rajdhani', 'sans-serif'],
            body:    ['Inter', '"Helvetica Neue"', 'sans-serif'],
            mono:    ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-body">

  <!-- Ambient glow orbs -->
  <div class="ambient-orb ambient-orb-blue"></div>
  <div class="ambient-orb ambient-orb-violet"></div>

  <div class="relative w-full max-w-sm z-10">

    <!-- Brand block -->
    <div class="flex flex-col items-center mb-8">
      <div class="mb-4">
        <svg width="56" height="56" viewBox="0 0 32 32" fill="none">
          <defs>
            <filter id="login-glow"><feGaussianBlur stdDeviation="1.2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <circle cx="16" cy="16" r="11" fill="#38BDF8" opacity="0.05"/>
          <circle cx="16" cy="16" r="6.5" fill="#38BDF8" opacity="0.7" filter="url(#login-glow)"/>
          <circle cx="14.5" cy="14.5" r="2" fill="white" opacity="0.3"/>
          <circle cx="5" cy="8" r="2.5" fill="#A78BFA" opacity="0.5"/>
          <circle cx="27" cy="8" r="2.5" fill="#34D399" opacity="0.5"/>
          <circle cx="5" cy="24" r="2" fill="#34D399" opacity="0.4"/>
          <circle cx="27" cy="24" r="2" fill="#A78BFA" opacity="0.4"/>
          <line x1="16" y1="16" x2="5" y2="8" stroke="#38BDF8" stroke-width="0.5" opacity="0.18"/>
          <line x1="16" y1="16" x2="27" y2="8" stroke="#38BDF8" stroke-width="0.5" opacity="0.18"/>
          <line x1="16" y1="16" x2="5" y2="24" stroke="#A78BFA" stroke-width="0.4" opacity="0.12"/>
          <line x1="16" y1="16" x2="27" y2="24" stroke="#A78BFA" stroke-width="0.4" opacity="0.12"/>
        </svg>
      </div>
      <h1 class="ng-display text-lg tracking-[6px] text-[--ng-text-primary]">NODEGLOW</h1>
      <p class="font-mono text-[10px] text-[--ng-text-muted] tracking-[3px] mt-1">MONITORING</p>
    </div>

    <!-- Card -->
    <div class="glass-elevated p-7">
      <h2 class="text-base font-semibold text-[--ng-text-primary] ng-heading mb-0.5">Sign in</h2>
      <p class="text-[--ng-text-muted] text-xs font-mono mb-6">Access your monitoring dashboard</p>

      {% if error %}
      <div class="mb-5 flex items-center gap-2 px-3 py-2.5 bg-[--ng-critical]/[0.08] border border-[--ng-critical]/20 rounded-lg text-[--ng-critical] text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        {{ csrf_input(request)|safe }}
        <div>
          <label class="block text-xs text-[--ng-text-muted] font-mono mb-1.5">Username</label>
          <input type="text" name="username" autofocus required autocomplete="username"
                 class="ng-input" placeholder="admin">
        </div>
        <div>
          <label class="block text-xs text-[--ng-text-muted] font-mono mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="ng-input">
        </div>
        <button type="submit" class="ng-btn ng-btn-primary w-full py-2.5">
          Sign in
        </button>
      </form>
    </div>

  </div>
</body>
</html>
