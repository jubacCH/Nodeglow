name: Build Rust Agent

on:
  push:
    paths:
      - "agent/**"
      - ".github/workflows/agent-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nodeglow-agent-linux
            binary: nodeglow-agent
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nodeglow-agent.exe
            binary: nodeglow-agent.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('agent/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: agent/build.log

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} || certutil -hashfile ${{ matrix.artifact }} SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: agent/${{ matrix.artifact }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: nodeglow-agent-linux
          path: dist/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: nodeglow-agent.exe
          path: dist/

      - name: Copy to backend static (for auto-update serving)
        run: |
          cp dist/nodeglow-agent-linux backend/static/nodeglow-agent-linux
          cp dist/nodeglow-agent.exe backend/static/nodeglow-agent.exe
          chmod +x backend/static/nodeglow-agent-linux
          ls -lh dist/ backend/static/nodeglow-agent*

      - name: Commit updated binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/static/nodeglow-agent-linux backend/static/nodeglow-agent.exe
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update Rust agent binaries [skip ci]"
            git push
          fi
