<svg width="100" height="100" viewBox="90 30 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60C8F5" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A8FD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A4A7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8E6FF"/>
      <stop offset="100%" stop-color="#2196CC"/>
    </radialGradient>
    <radialGradient id="node-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3F0"/>
      <stop offset="100%" stop-color="#1575B0"/>
    </radialGradient>
    <radialGradient id="node-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EC5EE"/>
      <stop offset="100%" stop-color="#0E5E98"/>
    </radialGradient>
    <filter id="blur-soft"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur-xs"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>

  <!-- Core glow bloom -->
  <ellipse cx="172" cy="110" rx="52" ry="52" fill="url(#core-glow)" filter="url(#blur-soft)" opacity="0.9"/>

  <!-- Edges -->
  <line x1="176" y1="98" x2="214" y2="62" stroke="#2FA8E8" stroke-width="1.2" opacity="0.6" stroke-dasharray="8 6"/>
  <line x1="176" y1="122" x2="214" y2="158" stroke="#2FA8E8" stroke-width="1.2" opacity="0.6" stroke-dasharray="8 6"/>
  <line x1="158" y1="110" x2="130" y2="110" stroke="#2FA8E8" stroke-width="1.2" opacity="0.5" stroke-dasharray="8 6"/>

  <!-- Satellite halos -->
  <circle cx="222" cy="56" r="14" fill="#1A8FD4" opacity="0.25" filter="url(#blur-xs)"/>
  <circle cx="222" cy="164" r="11" fill="#1A8FD4" opacity="0.20" filter="url(#blur-xs)"/>
  <circle cx="122" cy="110" r="10" fill="#1A8FD4" opacity="0.20" filter="url(#blur-xs)"/>

  <!-- Core node -->
  <circle cx="172" cy="110" r="13" fill="url(#node-a)" stroke="#60C8F5" stroke-width="1.5"/>
  <circle cx="172" cy="110" r="7" fill="#A8E6FF" opacity="0.9"/>

  <!-- Top-right satellite -->
  <circle cx="222" cy="56" r="8" fill="url(#node-b)" stroke="#4BBCE0" stroke-width="1.2"/>
  <circle cx="222" cy="56" r="3.5" fill="#C4EEFF" opacity="0.85"/>

  <!-- Bottom-right satellite -->
  <circle cx="222" cy="164" r="7" fill="url(#node-c)" stroke="#3AACE0" stroke-width="1"/>
  <circle cx="222" cy="164" r="3" fill="#B8EAFF" opacity="0.8"/>

  <!-- Left satellite -->
  <circle cx="122" cy="110" r="6.5" fill="url(#node-c)" stroke="#3AACE0" stroke-width="1"/>
  <circle cx="122" cy="110" r="2.8" fill="#B8EAFF" opacity="0.8"/>
</svg>
