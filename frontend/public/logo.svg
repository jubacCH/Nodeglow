<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60C8F5" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#1A8FD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A4A7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node-a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8E6FF"/>
      <stop offset="100%" stop-color="#2196CC"/>
    </radialGradient>
    <radialGradient id="node-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3F0"/>
      <stop offset="100%" stop-color="#1575B0"/>
    </radialGradient>
    <radialGradient id="node-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5EC5EE"/>
      <stop offset="100%" stop-color="#0E5E98"/>
    </radialGradient>
    <filter id="blur-soft"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur-xs"><feGaussianBlur stdDeviation="2.5"/></filter>
    
