  <!-- Wordmark: NODE -->
  <text x="272" y="133" font-family="'Syne', 'DM Sans', sans-serif" font-size="66" font-weight="800" letter-spacing="-1" fill="#E8F7FF" style="fill:rgb(232, 247, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, &quot;DM Sans&quot;, sans-serif;font-size:66px;font-weight:800;text-anchor:start;dominant-baseline:auto">NODE</text>

  <!-- Wordmark: GLOW -->
  <text x="464.73" y="133" font-family="'Syne', 'DM Sans', sans-serif" font-size="66" font-weight="800" letter-spacing="-1" fill="#38B8F0" style="fill:rgb(56, 184, 240);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, &quot;DM Sans&quot;, sans-serif;font-size:66px;font-weight:800;text-anchor:start;dominant-baseline:auto">GLOW</text>

  <!-- Dot separator -->
  <circle cx="465" cy="117" r="4" fill="#38B8F0" opacity="0.7" style="fill:rgb(56, 184, 240);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
