  <line x1="176" y1="122" x2="214" y2="158" stroke="#2FA8E8" stroke-width="1.2" opacity="0.6" style="fill:rgb(0, 0, 0);stroke:rgb(47, 168, 232);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-dasharray:8px, 6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
