  <!-- Background card -->
  <rect x="40" y="16" width="600" height="188" rx="22" fill="#07111D" stroke="#1A3A58" stroke-width="1" style="fill:rgb(7, 17, 29);stroke:rgb(26, 58, 88);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="40" y="16" width="600" height="188" rx="22" fill="none" stroke="#2A6FA8" stroke-width="0.5" opacity="0.4" style="fill:none;stroke:rgb(42, 111, 168);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Core glow bloom -->
